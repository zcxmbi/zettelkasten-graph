<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 640px;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
  font-family: system-ui, -apple-system, sans-serif;
  overflow: hidden;
  position: relative;
}
/* 网格背景 */
.grid {
  position: absolute; inset: 0;
  background-image: 
    radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
/* 节点 */
.node {
  position: absolute; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 600;
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
  transition: none;
}
.node-core { width: 56px; height: 56px; }
.node-medium { width: 42px; height: 42px; font-size: 9px; }
.node-small { width: 30px; height: 30px; font-size: 7px; }
/* 边 SVG */
.edges { position: absolute; inset: 0; pointer-events: none; }
/* 文字覆盖层 */
.overlay {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  background: linear-gradient(180deg, transparent 55%, rgba(10,10,26,0.85) 75%, rgba(10,10,26,0.95) 100%);
}
.title-area { position: absolute; top: 40px; left: 50%;
  transform: translateX(-50%); text-align: center; }
.title {
  font-size: 52px; font-weight: 800; color: #fff;
  letter-spacing: 2px;
  text-shadow: 0 0 40px rgba(100,180,255,0.4);
}
.title span { color: #60c0ff; }
.subtitle {
  font-size: 20px; color: rgba(255,255,255,0.7);
  margin-top: 12px; font-weight: 400;
}
.badges {
  position: absolute; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 18px; flex-wrap: wrap;
  justify-content: center;
  max-width: 1100px;
}
.badge {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 14px 22px;
  color: #fff; font-size: 15px; font-weight: 500;
  white-space: nowrap;
}
.badge em { color: #60c0ff; font-style: normal; font-weight: 700; }
.footer {
  position: absolute; bottom: 30px; left: 50%;
  transform: translateX(-50%);
  font-size: 14px; color: rgba(255,255,255,0.35);
  letter-spacing: 3px;
}
/* 光晕脉冲 */
@keyframes pulse1 { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes pulse2 { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
</style>
</head>
<body>
<div class="grid"></div>

<!-- 边 -->
<svg class="edges" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60c0ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a080ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6080" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffa060" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60ffa0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#60c0ff" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <!-- 核心边（粗） -->
  <line x1="640" y1="280" x2="340" y2="200" stroke="url(#g1)" stroke-width="3" opacity="0.8"/>
  <line x1="640" y1="280" x2="780" y2="160" stroke="url(#g1)" stroke-width="3" opacity="0.8"/>
  <line x1="640" y1="280" x2="500" y2="380" stroke="url(#g2)" stroke-width="2.5" opacity="0.7"/>
  <line x1="640" y1="280" x2="850" y2="350" stroke="url(#g2)" stroke-width="2.5" opacity="0.7"/>
  <line x1="640" y1="280" x2="640" y2="120" stroke="url(#g3)" stroke-width="2" opacity="0.6"/>
  <line x1="640" y1="280" x2="420" y2="120" stroke="url(#g3)" stroke-width="2" opacity="0.5"/>
  <line x1="640" y1="280" x2="920" y2="240" stroke="url(#g1)" stroke-width="2.5" opacity="0.7"/>
  <!-- 外围边 -->
  <line x1="340" y1="200" x2="220" y2="140" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="200" x2="200" y2="280" stroke="url(#g2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="780" y1="160" x2="980" y2="120" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="780" y1="160" x2="1020" y2="200" stroke="url(#g2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="380" x2="360" y2="440" stroke="url(#g2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="850" y1="350" x2="1020" y2="380" stroke="url(#g3)" stroke-width="1.5" opacity="0.4"/>
  <line x1="640" y1="120" x2="540" y2="60" stroke="url(#g3)" stroke-width="1" opacity="0.3"/>
  <line x1="640" y1="120" x2="750" y2="80" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="120" x2="300" y2="80" stroke="url(#g3)" stroke-width="1" opacity="0.3"/>
  <line x1="920" y1="240" x2="1100" y2="280" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="220" y1="140" x2="130" y2="200" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="280" x2="120" y2="340" stroke="url(#g2)" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="120" x2="1100" y2="160" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <line x1="1020" y1="200" x2="1140" y2="200" stroke="url(#g2)" stroke-width="1" opacity="0.3"/>
</svg>

<!-- 节点 -->
<div class="node node-core" style="left:612px; top:252px; background:radial-gradient(circle,#4ac0ff,#2080d0); animation: pulse1 3s infinite;">场景</div>
<div class="node node-medium" style="left:315px; top:175px; background:radial-gradient(circle,#ff6090,#c03060);">事件</div>
<div class="node node-medium" style="left:755px; top:135px; background:radial-gradient(circle,#a080ff,#6040c0);">节奏</div>
<div class="node node-medium" style="left:475px; top:355px; background:radial-gradient(circle,#60ffa0,#20a050);">利害</div>
<div class="node node-medium" style="left:825px; top:325px; background:radial-gradient(circle,#ffa060,#c06020);">冲突</div>
<div class="node node-small" style="left:620px; top:100px; background:radial-gradient(circle,#60c0ff,#3080c0);">节拍</div>
<div class="node node-small" style="left:398px; top:98px; background:radial-gradient(circle,#a080ff,#6040c0);">序列</div>
<div class="node node-small" style="left:200px; top:120px; background:radial-gradient(circle,#ff6090,#c03060);">移情</div>
<div class="node node-small" style="left:180px; top:258px; background:radial-gradient(circle,#ffa060,#c06020);">价值</div>
<div class="node node-small" style="left:960px; top:100px; background:radial-gradient(circle,#60ffa0,#20a050);">人设</div>
<div class="node node-small" style="left:1000px; top:178px; background:radial-gradient(circle,#60c0ff,#3080c0);">反转</div>
<div class="node node-small" style="left:340px; top:418px; background:radial-gradient(circle,#ff6090,#c03060);">模板</div>
<div class="node node-small" style="left:1000px; top:358px; background:radial-gradient(circle,#a080ff,#6040c0);">层级</div>
<div class="node node-small" style="left:520px; top:42px; background:radial-gradient(circle,#60ffa0,#20a050);">幕</div>
<div class="node node-small" style="left:730px; top:62px; background:radial-gradient(circle,#ffa060,#c06020);">叙</div>
<div class="node node-small" style="left:280px; top:62px; background:radial-gradient(circle,#60c0ff,#3080c0);">弧光</div>
<div class="node node-small" style="left:1080px; top:258px; background:radial-gradient(circle,#ff6090,#c03060);">真相</div>
<div class="node node-small" style="left:1080px; top:138px; background:radial-gradient(circle,#a080ff,#6040c0);">归属</div>
<div class="node node-small" style="left:108px; top:178px; background:radial-gradient(circle,#60ffa0,#20a050);">追</div>
<div class="node node-small" style="left:100px; top:320px; background:radial-gradient(circle,#a080ff,#6040c0);">逆袭</div>
<div class="node node-small" style="left:1120px; top:178px; background:radial-gradient(circle,#ffa060,#c06020);">体面</div>

<div class="overlay"></div>

<!-- 文字 -->
<div class="title-area">
  <div class="title">agent-<span>zettel</span>-graph</div>
  <div class="subtitle">卡片盒笔记 + Agent + 图论 · 人机共构的知识库</div>
</div>

<div class="badges">
  <div class="badge">🎯 <em>核心排序</em> 最重要</div>
  <div class="badge">🌉 <em>桥梁检测</em> 不可丢</div>
  <div class="badge">🏘️ <em>自然分组</em> 聚类</div>
  <div class="badge">🔮 <em>链接审查</em> 纠错AI</div>
  <div class="badge">✂️ <em>拆分建议</em> 过载</div>
  <div class="badge">🛤️ <em>概念路径</em> 导航</div>
  <div class="badge" style="background:rgba(96,192,255,0.15); border-color:rgba(96,192,255,0.3);">
    <em>14 种图分析方法</em>
  </div>
</div>

<div class="footer">ZETTELKASTEN + AGENT + GRAPH THEORY</div>
</body>
</html>
